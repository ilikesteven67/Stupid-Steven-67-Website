<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steven | Basics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="basics">
  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">S</span>
      <div>
        <p class="eyebrow">Profile Site</p>
        <h1>Steven</h1>
      </div>
    </div>

    <nav class="main-nav" aria-label="Primary">
      <a href="index.html" data-nav="overview">Overview</a>
      <a href="about.html" data-nav="about">About</a>
      <a href="gallery.html" data-nav="gallery">Gallery</a>
      <a href="hobbies.html" data-nav="hobbies">Hobbies</a>
      <a href="basics.html" data-nav="basics">Basics</a>
      <a href="more-info.html" data-nav="more-info">More Info</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="content-section page-top">
      <div class="section-heading">
        <p class="eyebrow">Basic Information</p>
        <h2>Stats and quick facts</h2>
      </div>
      <div class="stats-grid">
        <article class="stat-card">
          <span class="stat-label">Age</span>
          <strong class="stat-value">Add age</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Height</span>
          <strong class="stat-value">Add height</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Weight</span>
          <strong class="stat-value">Add weight</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Location</span>
          <strong class="stat-value">Add city or area</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Birthday</span>
          <strong class="stat-value">Add birthday</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Known For</span>
          <strong class="stat-value">Add a short title</strong>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Built as a multi-page profile website for Steven.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
