<!DOCTYPE html>
<html lang="en">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body data-page="search">
  <header class="site-header">

        <p class="eyebrow">Joke Profile Site</p>

          <div class="search-dropdown" data-search-dropdown hidden></div>

          <a class="social-link" href="https://facebook.com/your-profile-here" target="_blank" rel="noreferrer" aria-label="Steven on Facebook">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13.5 22v-8h2.7l.5-3.2h-3.2V8.7c0-.9.3-1.6 1.7-1.6H17V4.2c-.3 0-1.3-.2-2.5-.2-2.5 0-4.2 1.5-4.2 4.4v2.4H7.5V14h2.8v8h3.2Z"/>
            </svg>

          <a class="social-link" href="https://instagram.com/your-profile-here" target="_blank" rel="noreferrer" aria-label="Steven on Instagram">

            </svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section class="content-section page-top search-results-section" id="search-results-page">
      <div class="section-heading">
        <p class="eyebrow">Search Results</p>
        <h2 data-results-heading>Results for your search</h2>
      </div>
      <div class="search-results-list" data-results-list></div>

  <footer class="site-footer">
    <p>Built as a multi-page joke website for Stupid Steven.</p>
